name: Integration 7B — Summarization & Integrated Evaluation Report Autograder
on:
  push:
    branches-ignore: ['stretch-thu-*']
  pull_request:
    branches: [main]
    paths-ignore:
      - 'stretch/thursday/**'

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --index-url https://download.pytorch.org/whl/cpu torch
          pip install -r requirements.txt

      - name: Run smoke pipeline (substitute fixture)
        env:
          HF_HUB_DISABLE_TELEMETRY: '1'
        run: make smoke

      - name: Run autograder tests
        env:
          HF_HUB_DISABLE_TELEMETRY: '1'
        run: pytest tests/test_integration.py -v
