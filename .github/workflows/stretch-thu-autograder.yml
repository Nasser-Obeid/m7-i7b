name: Stretch Thu (Honors) — Summarize-then-QA Autograder
on:
  push:
    branches: ['stretch-thu-*']
  pull_request:
    branches: [main]
    paths:
      - 'stretch/thursday/**'
      - 'tests/test_stretch_thu.py'

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --index-url https://download.pytorch.org/whl/cpu torch
          pip install -r requirements.txt

      - name: Run stretch autograder
        env:
          HF_HUB_DISABLE_TELEMETRY: '1'
        run: pytest tests/test_stretch_thu.py -v
